<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- Self-contained fontconfig for the deployed image: guarantees the layer
     engine's code-rendered typography works without system fonts.
     Activate with FONTCONFIG_PATH=/app2/data/fonts -->
<fontconfig>
  <dir>/app2/data/fonts</dir>
  <cachedir>/tmp/fccache</cachedir>
</fontconfig>
